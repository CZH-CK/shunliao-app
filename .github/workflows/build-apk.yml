name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli@latest @capacitor/core@latest @capacitor/android@latest

    - name: Init and add Android platform
      run: |
        npx cap init shunliao com.shunliao.app --web-dir wechat-app
        npx cap add android || true
        npx cap sync android

    - name: Build Debug APK
      working-directory: android
      run: ./gradlew assembleDebug --stacktrace --info 2>&1 | head -200

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: shunliao-debug-apk
        path: android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
