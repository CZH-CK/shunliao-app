<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07C160">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="顺聊">
<meta name="description" content="顺聊 - 顺顺利利地聊天">
<title>顺聊</title>

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; max-width: 420px; margin: 0 auto; min-height: 100vh; }
.hidden { display: none !important; }

/* 启动页 */
#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #07C160, #06AD56); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
#splash.fade-out { opacity: 0; pointer-events: none; }
#splash .logo { font-size: 80px; margin-bottom: 20px; }
#splash .app-name { color: white; font-size: 36px; font-weight: bold; margin-bottom: 10px; }
#splash .tagline { color: rgba(255,255,255,0.9); font-size: 16px; }

/* 登录页 */
#login-page { padding: 40px 30px; }
#login-page .logo { text-align: center; font-size: 60px; margin: 40px 0 20px; }
#login-page h2 { text-align: center; color: #07C160; font-size: 28px; margin-bottom: 8px; }
#login-page .subtitle { text-align: center; color: #999; margin-bottom: 40px; }
.input-group { margin-bottom: 20px; }
.input-group label { display: block; margin-bottom: 8px; color: #333; font-size: 14px; }
.input-group input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
.input-group input:focus { border-color: #07C160; outline: none; }
.btn-primary { width: 100%; padding: 14px; background: #07C160; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
.btn-primary:active { background: #06AD56; }

/* 主界面 */
#main-app { height: 100vh; display: flex; flex-direction: column; background: white; }
/* 顶部导航 */
.top-bar { background: #07C160; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
.top-bar .title { font-size: 18px; font-weight: 600; }
/* 标签页 */
.tabs { display: flex; background: white; border-bottom: 1px solid #e0e0e0; }
.tab { flex: 1; text-align: center; padding: 12px; font-size: 14px; color: #999; cursor: pointer; position: relative; }
.tab.active { color: #07C160; }
.tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: #07C160; border-radius: 2px; }
/* 内容区 */
.content { flex: 1; overflow-y: auto; background: #f5f5f5; }
/* 聊天列表 */
.chat-item { display: flex; padding: 16px; background: white; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
.chat-item:active { background: #f9f9f9; }
.chat-avatar { width: 50px; height: 50px; border-radius: 8px; background: #07C160; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 12px; flex-shrink: 0; }
.chat-info { flex: 1; }
.chat-name { font-size: 16px; color: #333; margin-bottom: 6px; }
.chat-msg { font-size: 13px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-meta { text-align: right; }
.chat-time { font-size: 12px; color: #bbb; }
.chat-badge { background: #f56c6c; color: white; font-size: 12px; padding: 2px 8px; border-radius: 10px; margin-top: 4px; display: inline-block; }

/* 聊天界面 */
#chat-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: none; max-width: 420px; margin: 0 auto; }
#chat-page.show { display: flex; flex-direction: column; }
.chat-header { background: #07C160; color: white; padding: 12px 16px; display: flex; align-items: center; }
.chat-header .back-btn { font-size: 20px; margin-right: 12px; cursor: pointer; }
.chat-header .chat-title { flex: 1; font-size: 16px; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: #f5f5f5; }
.msg-bubble { margin-bottom: 16px; display: flex; }
.msg-bubble.self { flex-direction: row-reverse; }
.msg-bubble .avatar { width: 40px; height: 40px; border-radius: 6px; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.msg-bubble.self .avatar { display: none; }
.msg-bubble .bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.5; }
.msg-bubble:not(.self) .bubble { background: white; border-top-left-radius: 4px; }
.msg-bubble.self .bubble { background: #95EC69; border-top-right-radius: 4px; }
.msg-bubble .msg-time { font-size: 11px; color: #bbb; margin: 4px 8px; }
.msg-bubble.self .msg-time { text-align: right; }
.chat-input-area { display: flex; padding: 12px; background: white; border-top: 1px solid #e0e0e0; gap: 8px; }
.chat-input-area input { flex: 1; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 20px; font-size: 15px; }
.chat-input-area button { padding: 10px 20px; background: #07C160; color: white; border: none; border-radius: 20px; cursor: pointer; }

/* 通讯录 */
.contact-group-title { padding: 8px 16px; font-size: 13px; color: #999; background: #f5f5f5; }
.contact-item { display: flex; padding: 12px 16px; background: white; border-bottom: 1px solid #f0f0f0; align-items: center; }
.contact-item .avatar { width: 44px; height: 44px; border-radius: 6px; background: #07C160; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px; }

/* 发现页 */
.discover-item { display: flex; padding: 14px 16px; background: white; border-bottom: 1px solid #f0f0f0; align-items: center; cursor: pointer; }
.discover-item .icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px; }
.discover-item .name { flex: 1; font-size: 15px; }
.discover-item .arrow { color: #ccc; }

/* 我 */
.profile-header { background: linear-gradient(135deg, #07C160, #06AD56); padding: 40px 20px; color: white; text-align: center; }
.profile-header .avatar { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 12px; }
.profile-header .name { font-size: 20px; font-weight: 600; }
.menu-item { display: flex; padding: 14px 16px; background: white; border-bottom: 1px solid #f0f0f0; align-items: center; }
.menu-item .icon { margin-right: 12px; font-size: 20px; }
.menu-item .label { flex: 1; font-size: 15px; }
.menu-item .value { color: #999; margin-right: 8px; font-size: 14px; }
.menu-item .arrow { color: #ccc; }

/* 安装提示 */
.install-prompt { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 16px 24px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 1000; display: none; max-width: 90%; }
.install-prompt.show { display: block; }
.install-prompt .text { font-size: 14px; margin-bottom: 12px; }
.install-prompt button { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
.install-prompt .install-btn { background: #07C160; color: white; margin-right: 8px; }
.install-prompt .cancel-btn { background: #f0f0f0; color: #666; }
</style>
</head>
<body>

<!-- 启动页 -->
<div id="splash">
  <div class="logo">💬</div>
  <div class="app-name">顺聊</div>
  <div class="tagline">顺顺利利 · 畅快聊天</div>
</div>

<!-- 登录页 -->
<div id="login-page">
  <div class="logo">💬</div>
  <h2>顺聊</h2>
  <div class="subtitle">顺顺利利 · 畅快聊天</div>
  <div class="input-group">
    <label>用户ID</label>
    <input type="text" id="loginUserID" placeholder="输入用户ID" value="user001">
  </div>
  <button class="btn-primary" onclick="doLogin()">登录</button>
  <div style="text-align: center; margin-top: 20px; font-size: 13px; color: #999;">
    提示：模拟模式，任意用户ID均可登录
  </div>
</div>

<!-- 主应用 -->
<div id="main-app" class="hidden">
  <!-- 顶部栏 -->
  <div class="top-bar">
    <span class="title" id="page-title">顺聊</span>
    <span style="font-size: 20px; cursor: pointer;" onclick="showAdd()">＋</span>
  </div>

  <!-- 标签页 -->
  <div class="tabs">
    <div class="tab active" data-tab="chats" onclick="switchTab('chats')">💬 聊天</div>
    <div class="tab" data-tab="contacts" onclick="switchTab('contacts')">👥 通讯录</div>
    <div class="tab" data-tab="discover" onclick="switchTab('discover')">🔍 发现</div>
    <div class="tab" data-tab="me" onclick="switchTab('me')">👤 我</div>
  </div>

  <!-- 内容区 -->
  <div class="content" id="content">
    <!-- 聊天列表 -->
    <div id="tab-chats">
      <div class="chat-item" onclick="openChat('user002', '张三')">
        <div class="chat-avatar">👤</div>
        <div class="chat-info">
          <div class="chat-name">张三</div>
          <div class="chat-msg">你好！最近怎么样？</div>
        </div>
        <div class="chat-meta">
          <div class="chat-time">14:30</div>
          <div class="chat-badge">3</div>
        </div>
      </div>
      <div class="chat-item" onclick="openChat('user003', '李四')">
        <div class="chat-avatar">👤</div>
        <div class="chat-info">
          <div class="chat-name">李四</div>
          <div class="chat-msg">明天一起吃饭吗？</div>
        </div>
        <div class="chat-meta">
          <div class="chat-time">昨天</div>
        </div>
      </div>
      <div class="chat-item" onclick="openChat('user004', '王五')">
        <div class="chat-avatar">👤</div>
        <div class="chat-info">
          <div class="chat-name">王五</div>
          <div class="chat-msg">[图片]</div>
        </div>
        <div class="chat-meta">
          <div class="chat-time">周一</div>
        </div>
      </div>
    </div>

    <!-- 通讯录 -->
    <div id="tab-contacts" class="hidden">
      <div class="contact-group-title">新的朋友</div>
      <div class="contact-item">
        <div class="avatar">➕</div>
        <div style="font-size:15px;">添加好友</div>
      </div>
      <div class="contact-group-title">A</div>
      <div class="contact-item" onclick="openChat('user002', '张三')">
        <div class="avatar">👤</div>
        <div>张三</div>
      </div>
      <div class="contact-group-title">L</div>
      <div class="contact-item" onclick="openChat('user003', '李四')">
        <div class="avatar">👤</div>
        <div>李四</div>
      </div>
    </div>

    <!-- 发现 -->
    <div id="tab-discover" class="hidden">
      <div style="height:12px;"></div>
      <div class="discover-item" onclick="alert('朋友圈功能开发中')">
        <div class="icon" style="background:#ff6b6b;">📷</div>
        <div class="name">朋友圈</div>
        <div class="arrow">›</div>
      </div>
      <div class="discover-item" onclick="alert('视频号功能开发中')">
        <div class="icon" style="background:#ffd93d;">🎬</div>
        <div class="name">视频号</div>
        <div class="arrow">›</div>
      </div>
      <div style="height:12px;"></div>
      <div class="discover-item" onclick="alert('扫一扫功能开发中')">
        <div class="icon" style="background:#6bcb77;">📱</div>
        <div class="name">扫一扫</div>
        <div class="arrow">›</div>
      </div>
    </div>

    <!-- 我 -->
    <div id="tab-me" class="hidden">
      <div class="profile-header">
        <div class="avatar">👤</div>
        <div class="name" id="profile-name">用户001</div>
        <div style="font-size:13px;opacity:0.9;margin-top:4px;">ID: user001</div>
      </div>
      <div style="height:12px;"></div>
      <div class="menu-item">
        <span class="icon">💰</span>
        <span class="label">支付</span>
        <span class="arrow">›</span>
      </div>
      <div class="menu-item">
        <span class="icon">⭐</span>
        <span class="label">收藏</span>
        <span class="arrow">›</span>
      </div>
      <div class="menu-item">
        <span class="icon">📷</span>
        <span class="label">朋友圈</span>
        <span class="arrow">›</span>
      </div>
      <div style="height:12px;"></div>
      <div class="menu-item">
        <span class="icon">⚙️</span>
        <span class="label">设置</span>
        <span class="arrow">›</span>
      </div>
      <div class="menu-item">
        <span class="icon">ℹ️</span>
        <span class="label">关于顺聊</span>
        <span class="value">v1.0.0</span>
        <span class="arrow">›</span>
      </div>
    </div>
  </div>
</div>

<!-- 聊天界面 -->
<div id="chat-page">
  <div class="chat-header">
    <span class="back-btn" onclick="closeChat()">‹</span>
    <span class="chat-title" id="chat-title">聊天</span>
    <span style="font-size:20px;">⋯</span>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="msg-bubble">
      <div class="avatar">👤</div>
      <div>
        <div class="bubble">你好！我是张三 😊</div>
        <div class="msg-time">14:30</div>
      </div>
    </div>
  </div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button onclick="sendMessage()">发送</button>
  </div>
</div>

<!-- 安装提示 -->
<div class="install-prompt" id="install-prompt">
  <div class="text">📱 是否将"顺聊"安装到手机桌面？</div>
  <button class="install-btn" onclick="installApp()">安装</button>
  <button class="cancel-btn" onclick="dismissInstall()">取消</button>
</div>

<script>
// ========== 状态 ==========
let currentUser = '';
let currentChat = '';
let deferredPrompt = null;

// ========== PWA 安装 ==========
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    document.getElementById('install-prompt').classList.add('show');
  }, 3000);
});

async function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      console.log('用户同意安装');
    }
    deferredPrompt = null;
  }
  document.getElementById('install-prompt').classList.remove('show');
}

function dismissInstall() {
  document.getElementById('install-prompt').classList.remove('show');
}

// ========== 启动页 ==========
setTimeout(() => {
  document.getElementById('splash').classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('splash').style.display = 'none';
  }, 500);
}, 1500);

// ========== 登录 ==========
function doLogin() {
  const userID = document.getElementById('loginUserID').value.trim();
  if (!userID) { alert('请输入用户ID'); return; }
  currentUser = userID;
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('profile-name').textContent = userID;
}

// ========== 标签页切换 ==========
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('tab-chats').classList.add('hidden');
  document.getElementById('tab-contacts').classList.add('hidden');
  document.getElementById('tab-discover').classList.add('hidden');
  document.getElementById('tab-me').classList.add('hidden');
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  
  const titles = { chats: '顺聊', contacts: '通讯录', discover: '发现', me: '我' };
  document.getElementById('page-title').textContent = titles[tab];
}

// ========== 聊天 ==========
function openChat(userID, name) {
  currentChat = userID;
  document.getElementById('chat-title').textContent = name;
  document.getElementById('chat-page').classList.add('show');
}

function closeChat() {
  document.getElementById('chat-page').classList.remove('show');
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  
  const msgHTML = `
    <div class="msg-bubble self">
      <div>
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="msg-time">刚刚</div>
      </div>
    </div>
  `;
  document.getElementById('chat-messages').insertAdjacentHTML('beforeend', msgHTML);
  input.value = '';
  document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
  
  // 模拟回复
  setTimeout(() => {
    const replyHTML = `
      <div class="msg-bubble">
        <div class="avatar">👤</div>
        <div>
          <div class="bubble">收到！</div>
          <div class="msg-time">刚刚</div>
        </div>
      </div>
    `;
    document.getElementById('chat-messages').insertAdjacentHTML('beforeend', replyHTML);
    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
  }, 1000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ========== 添加 ==========
function showAdd() {
  const tab = document.querySelector('.tab.active').dataset.tab;
  if (tab === 'chats') {
    const userID = prompt('输入要聊天的用户ID：');
    if (userID) openChat(userID, userID);
  } else if (tab === 'contacts') {
    alert('添加好友功能开发中');
  }
}
</script>
</body>
</html>
