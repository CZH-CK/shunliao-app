<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07C160">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="顺聊">
<meta name="description" content="顺聊 - 顺顺利利地聊天">
<title>顺聊</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; max-width: 420px; margin: 0 auto; min-height: 100vh; }

/* 启动页 */
#splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #07C160, #06AD56); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
#splash.fade-out { opacity: 0; pointer-events: none; }
#splash .logo { font-size: 80px; margin-bottom: 20px; }
#splash .app-name { color: white; font-size: 36px; font-weight: bold; margin-bottom: 10px; }
#splash .tagline { color: rgba(255,255,255,0.9); font-size: 16px; }

/* 登录页 */
#login-page { padding: 30px 24px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
#login-page .logo { text-align: center; font-size: 60px; margin-bottom: 16px; }
#login-page h2 { text-align: center; color: #07C160; font-size: 28px; margin-bottom: 6px; }
#login-page .subtitle { text-align: center; color: #999; margin-bottom: 32px; font-size: 14px; }
.input-group { margin-bottom: 16px; }
.input-group label { display: block; margin-bottom: 6px; color: #333; font-size: 14px; font-weight: 500; }
.input-group input, .input-group textarea { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: border-color 0.2s; }
.input-group input:focus, .input-group textarea:focus { border-color: #07C160; outline: none; }
.input-group textarea { height: 80px; resize: vertical; font-family: monospace; font-size: 13px; }
.mode-switch { display: flex; background: #f0f0f0; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
.mode-switch button { flex: 1; padding: 10px; border: none; background: transparent; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.mode-switch button.active { background: #07C160; color: white; font-weight: 600; }
.btn-primary { width: 100%; padding: 14px; background: #07C160; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn-primary:active { background: #06AD56; }
.btn-secondary { width: 100%; padding: 12px; background: white; color: #07C160; border: 2px solid #07C160; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 10px; }
.hint { font-size: 12px; color: #999; margin-top: 6px; line-height: 1.5; }
.error-msg { color: #f56c6c; font-size: 13px; margin-top: 8px; display: none; }
.success-msg { color: #07C160; font-size: 13px; margin-top: 8px; display: none; }

/* 主界面 */
#main-app { height: 100vh; display: flex; flex-direction: column; background: white; }
.top-bar { background: #07C160; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.top-bar .title { font-size: 18px; font-weight: 600; }
.top-bar .actions { display: flex; gap: 12px; }
.top-bar .actions span { font-size: 20px; cursor: pointer; }
.tabs { display: flex; background: white; border-bottom: 1px solid #e0e0e0; flex-shrink: 0; }
.tab { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; color: #999; cursor: pointer; position: relative; }
.tab.active { color: #07C160; font-weight: 600; }
.tab.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: #07C160; border-radius: 2px; }
.content { flex: 1; overflow-y: auto; background: #f5f5f5; }

/* 聊天列表 */
.chat-item { display: flex; padding: 14px 16px; background: white; border-bottom: 1px solid #f0f0f0; cursor: pointer; align-items: center; }
.chat-item:active { background: #f9f9f9; }
.chat-avatar { width: 50px; height: 50px; border-radius: 8px; background: #07C160; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 12px; flex-shrink: 0; color: white; }
.chat-info { flex: 1; overflow: hidden; }
.chat-name { font-size: 16px; color: #333; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-msg { font-size: 13px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-meta { text-align: right; flex-shrink: 0; margin-left: 8px; }
.chat-time { font-size: 12px; color: #bbb; }
.chat-badge { background: #f56c6c; color: white; font-size: 11px; padding: 1px 7px; border-radius: 10px; margin-top: 4px; display: inline-block; min-width: 20px; text-align: center; }

/* 聊天界面 */
#chat-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: none; max-width: 420px; margin: 0 auto; flex-direction: column; }
#chat-page.show { display: flex; }
.chat-header { background: #07C160; color: white; padding: 12px 16px; display: flex; align-items: center; flex-shrink: 0; }
.chat-header .back-btn { font-size: 22px; margin-right: 12px; cursor: pointer; }
.chat-header .chat-title { flex: 1; font-size: 16px; text-align: center; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: #f5f5f5; }
.msg-bubble { margin-bottom: 16px; display: flex; align-items: flex-start; }
.msg-bubble.self { flex-direction: row-reverse; }
.msg-bubble .avatar { width: 40px; height: 40px; border-radius: 6px; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.msg-bubble.self .avatar { display: none; }
.msg-bubble .bubble-wrap { max-width: 75%; margin: 0 8px; }
.msg-bubble:not(.self) .bubble-wrap { margin-left: 0; }
.msg-bubble.self .bubble-wrap { margin-right: 0; }
.msg-bubble .bubble { padding: 10px 14px; border-radius: 12px; font-size: 15px; line-height: 1.5; word-break: break-word; }
.msg-bubble:not(.self) .bubble { background: white; border-top-left-radius: 4px; }
.msg-bubble.self .bubble { background: #95EC69; border-top-right-radius: 4px; }
.msg-bubble .msg-time { font-size: 11px; color: #bbb; margin-top: 4px; }
.msg-bubble.self .msg-time { text-align: right; }
.typing-indicator { padding: 8px 16px; font-size: 13px; color: #999; font-style: italic; display: none; }
.chat-input-area { display: flex; padding: 10px 12px; background: white; border-top: 1px solid #e0e0e0; gap: 8px; align-items: center; flex-shrink: 0; }
.chat-input-area input { flex: 1; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 20px; font-size: 15px; outline: none; }
.chat-input-area button { padding: 10px 18px; background: #07C160; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; flex-shrink: 0; }

/* 通讯录 */
.contact-group-title { padding: 8px 16px; font-size: 13px; color: #999; background: #f5f5f5; }
.contact-item { display: flex; padding: 12px 16px; background: white; border-bottom: 1px solid #f0f0f0; align-items: center; cursor: pointer; }
.contact-item:active { background: #f9f9f9; }
.contact-item .avatar { width: 44px; height: 44px; border-radius: 6px; background: #07C160; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px; color: white; flex-shrink: 0; }

/* 发现页 */
.discover-section { margin-top: 12px; }
.discover-item { display: flex; padding: 14px 16px; background: white; border-bottom: 1px solid #f0f0f0; align-items: center; cursor: pointer; }
.discover-item:active { background: #f9f9f9; }
.discover-item .icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 12px; flex-shrink: 0; }
.discover-item .name { flex: 1; font-size: 15px; }
.discover-item .arrow { color: #ccc; font-size: 18px; }

/* 我 */
.profile-header { background: linear-gradient(135deg, #07C160, #06AD56); padding: 40px 20px 30px; color: white; text-align: center; }
.profile-header .avatar { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 12px; }
.profile-header .name { font-size: 20px; font-weight: 600; }
.profile-header .id { font-size: 13px; opacity: 0.9; margin-top: 4px; }
.menu-section { margin-top: 12px; }
.menu-item { display: flex; padding: 14px 16px; background: white; border-bottom: 1px solid #f0f0f0; align-items: center; cursor: pointer; }
.menu-item:active { background: #f9f9f9; }
.menu-item .icon { margin-right: 12px; font-size: 20px; width: 28px; text-align: center; }
.menu-item .label { flex: 1; font-size: 15px; }
.menu-item .value { color: #999; margin-right: 8px; font-size: 14px; }
.menu-item .arrow { color: #ccc; font-size: 18px; }

/* 连接状态 */
#conn-status { position: fixed; top: 0; left: 0; right: 0; max-width: 420px; margin: 0 auto; padding: 6px; text-align: center; font-size: 12px; z-index: 200; transition: all 0.3s; display: none; }
#conn-status.connected { background: #e8f5e9; color: #2e7d32; }
#conn-status.disconnected { background: #ffebee; color: #c62828; }
#conn-status.connecting { background: #fff8e1; color: #f57f17; }

/* 搜索栏 */
.search-bar { padding: 10px 16px; background: white; }
.search-bar input { width: 100%; padding: 8px 12px; border: none; background: #f5f5f5; border-radius: 6px; font-size: 14px; outline: none; }

.hidden { display: none !important; }
</style>
</head>
<body>

<!-- 连接状态 -->
<div id="conn-status"></div>

<!-- 启动页 -->
<div id="splash">
  <div class="logo">💬</div>
  <div class="app-name">顺聊</div>
  <div class="tagline">顺顺利利 · 畅快聊天</div>
</div>

<!-- 登录页 -->
<div id="login-page" class="hidden">
  <div class="logo">💬</div>
  <h2>顺聊</h2>
  <div class="subtitle">顺顺利利 · 畅快聊天</div>

  <div class="mode-switch">
    <button class="active" onclick="switchMode('real')" id="btn-mode-real">真实模式</button>
    <button onclick="switchMode('mock')" id="btn-mode-mock">模拟模式</button>
  </div>

  <!-- 真实模式登录 -->
  <div id="real-login">
    <div class="input-group">
      <label>用户ID</label>
      <input type="text" id="loginUserID" placeholder="输入用户ID" value="user001">
    </div>
    <div class="input-group">
      <label>UserSig（来自腾讯云控制台）</label>
      <textarea id="loginUserSig" placeholder="粘贴你的 UserSig..."></textarea>
      <div class="hint">💡 获取方式：腾讯云控制台 → IM → 辅助工具 → UserSig生成</div>
    </div>
    <button class="btn-primary" onclick="loginReal()">登录（真实模式）</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <!-- 模拟模式登录 -->
  <div id="mock-login" class="hidden">
    <div class="input-group">
      <label>用户ID（任意名称）</label>
      <input type="text" id="mockUserID" placeholder="输入任意用户ID" value="user001">
    </div>
    <button class="btn-primary" onclick="loginMock()">登录（模拟模式）</button>
    <div class="hint" style="margin-top:10px;">⚠️ 模拟模式下消息不会真正发送，仅用于演示</div>
  </div>

  <button class="btn-secondary" onclick="showHelp()" style="margin-top:12px;">如何获取 UserSig？</button>
</div>

<!-- 主应用 -->
<div id="main-app" class="hidden">
  <!-- 顶部栏 -->
  <div class="top-bar">
    <span class="title" id="page-title">顺聊</span>
    <div class="actions">
      <span onclick="showSearch()">🔍</span>
      <span onclick="showAdd()">＋</span>
    </div>
  </div>

  <!-- 搜索栏 -->
  <div id="search-bar" class="search-bar hidden">
    <input type="text" placeholder="搜索..." id="search-input" oninput="doSearch(this.value)">
  </div>

  <!-- 标签页 -->
  <div class="tabs">
    <div class="tab active" data-tab="chats" onclick="switchTab('chats')">💬 聊天</div>
    <div class="tab" data-tab="contacts" onclick="switchTab('contacts')">👥 通讯录</div>
    <div class="tab" data-tab="discover" onclick="switchTab('discover')">🔍 发现</div>
    <div class="tab" data-tab="me" onclick="switchTab('me')">👤 我</div>
  </div>

  <!-- 内容区 -->
  <div class="content" id="content">
    <!-- 聊天列表 -->
    <div id="tab-chats">
      <div id="chat-list-empty" class="hint" style="text-align:center;padding:40px 20px;display:none;">
        暂无聊天记录<br>点右上角 ＋ 开始新聊天
      </div>
    </div>

    <!-- 通讯录 -->
    <div id="tab-contacts" class="hidden">
      <div class="contact-group-title">新的朋友</div>
      <div class="contact-item" onclick="alert('添加好友功能开发中')">
        <div class="avatar">➕</div>
        <div style="font-size:15px;">添加好友</div>
      </div>
      <div id="contact-list"></div>
    </div>

    <!-- 发现 -->
    <div id="tab-discover" class="hidden">
      <div class="discover-section">
        <div class="discover-item" onclick="alert('朋友圈功能开发中')">
          <div class="icon" style="background:#ff6b6b;">📷</div>
          <div class="name">朋友圈</div>
          <div class="arrow">›</div>
        </div>
        <div class="discover-item" onclick="alert('视频号功能开发中')">
          <div class="icon" style="background:#ffd93d;">🎬</div>
          <div class="name">视频号</div>
          <div class="arrow">›</div>
        </div>
      </div>
      <div class="discover-section">
        <div class="discover-item" onclick="alert('扫一扫功能开发中')">
          <div class="icon" style="background:#6bcb77;">📱</div>
          <div class="name">扫一扫</div>
          <div class="arrow">›</div>
        </div>
      </div>
    </div>

    <!-- 我 -->
    <div id="tab-me" class="hidden">
      <div class="profile-header">
        <div class="avatar">👤</div>
        <div class="name" id="profile-name">用户</div>
        <div class="id" id="profile-id">ID: --</div>
      </div>
      <div class="menu-section">
        <div class="menu-item">
          <span class="icon">💰</span>
          <span class="label">支付</span>
          <span class="arrow">›</span>
        </div>
        <div class="menu-item">
          <span class="icon">⭐</span>
          <span class="label">收藏</span>
          <span class="arrow">›</span>
        </div>
      </div>
      <div class="menu-section">
        <div class="menu-item" onclick="doLogout()">
          <span class="icon">🚪</span>
          <span class="label">退出登录</span>
          <span class="arrow">›</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 聊天界面 -->
<div id="chat-page">
  <div class="chat-header">
    <span class="back-btn" onclick="closeChat()">‹</span>
    <span class="chat-title" id="chat-title">聊天</span>
    <span style="font-size:20px;cursor:pointer;" onclick="alert('更多功能开发中')">⋯</span>
  </div>
  <div class="typing-indicator" id="typing-indicator">对方正在输入...</div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
// ========== 配置 ==========
const SDKAppID = 1600147983;

// ========== 状态 ==========
let state = {
  mode: 'real',
  userID: '',
  userSig: '',
  tim: null,
  isConnected: false,
  currentChat: null,
  chats: {},
  mockUsers: {
    'user001': { name: '我', avatar: '👤' },
    'user002': { name: '张三', avatar: '😊' },
    'user003': { name: '李四', avatar: '🎉' },
    'user004': { name: '王五', avatar: '⚽' },
  }
};

// ========== 启动页 ==========
setTimeout(function() {
  document.getElementById('splash').classList.add('fade-out');
  setTimeout(function() {
    document.getElementById('splash').style.display = 'none';
    // 检查是否已登录
    const saved = localStorage.getItem('sl_user');
    if (saved) {
      try {
        const u = JSON.parse(saved);
        state.mode = u.mode || 'mock';
        state.userID = u.userID;
        state.userSig = u.userSig || '';
        if (state.mode === 'real' && state.userSig) {
          doRealLogin(u.userID, u.userSig);
        } else {
          doMockLogin(u.userID);
        }
        return;
      } catch(e) {}
    }
    // 显示登录页
    document.getElementById('login-page').classList.remove('hidden');
  }, 500);
}, 1500);

// ========== 模式切换 ==========
function switchMode(mode) {
  state.mode = mode;
  document.getElementById('btn-mode-real').classList.toggle('active', mode === 'real');
  document.getElementById('btn-mode-mock').classList.toggle('active', mode === 'mock');
  document.getElementById('real-login').classList.toggle('hidden', mode !== 'real');
  document.getElementById('mock-login').classList.toggle('hidden', mode !== 'mock');
}

// ========== 真实模式登录 ==========
async function loginReal() {
  const userID = document.getElementById('loginUserID').value.trim();
  const userSig = document.getElementById('loginUserSig').value.trim();
  if (!userID) { showLoginError('请输入用户ID'); return; }
  if (!userSig) { showLoginError('请粘贴 UserSig（从腾讯云控制台获取）'); return; }

  showConnStatus('connecting', '正在连接腾讯云 IM...');
  await doRealLogin(userID, userSig);
}

async function doRealLogin(userID, userSig) {
  state.userID = userID;
  state.userSig = userSig;

  try {
    // 动态加载 TIM SDK
    if (typeof TIM === 'undefined') {
      await loadTIMSDK();
    }

    const tim = TIM.create({ SDKAppID: SDKAppID });
    state.tim = tim;

    // 监听事件
    tim.on(TIM.EVENT.SDK_READY, function() {
      console.log('IM SDK ready');
      state.isConnected = true;
      showConnStatus('connected', '已连接到腾讯云 IM');
      onIMReady();
    });

    tim.on(TIM.EVENT.MESSAGE_RECEIVED, function(event) {
      event.data.forEach(function(msg) { handleIncomingMessage(msg); });
    });

    tim.on(TIM.EVENT.SDK_NOT_READY, function() {
      state.isConnected = false;
      showConnStatus('disconnected', '连接断开，正在重连...');
    });

    tim.on(TIM.EVENT.KICKED_OUT, function() {
      alert('账号在其他设备登录，已被踢下线');
      doLogout();
    });

    // 登录
    await tim.login({ userID: userID, userSig: userSig });
    console.log('IM login success');

    // 保存登录状态
    localStorage.setItem('sl_user', JSON.stringify({ userID: userID, userSig: userSig, mode: 'real' }));

    // 进入主界面
    enterMainApp();

  } catch (err) {
    console.error('IM login failed:', err);
    showLoginError('登录失败：' + (err.message || JSON.stringify(err)));
    showConnStatus('disconnected', '连接失败，请检查 UserSig 是否正确');
  }
}

function loadTIMSDK() {
  return new Promise(function(resolve, reject) {
    if (typeof TIM !== 'undefined') { resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://web.sdk.qcloud.com/im/sdk/v3/script/index.js';
    script.onload = resolve;
    script.onerror = function() {
      const s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/tim-js-sdk@2.21.1/tim-js-friendship.js';
      s2.onload = resolve;
      s2.onerror = function() { reject(new Error('TIM SDK 加载失败')); };
      document.head.appendChild(s2);
    };
    document.head.appendChild(script);
  });
}

function onIMReady() {
  // 拉取会话列表
  state.tim.getConversationList().then(function(res) {
    const list = res.data.conversationList || [];
    renderChatList(list);
  }).catch(function() {});
}

// ========== 模拟模式登录 ==========
function loginMock() {
  const userID = document.getElementById('mockUserID').value.trim();
  if (!userID) { showLoginError('请输入用户ID'); return; }
  doMockLogin(userID);
}

function doMockLogin(userID) {
  state.userID = userID;
  state.mode = 'mock';
  state.isConnected = false;
  localStorage.setItem('sl_user', JSON.stringify({ userID: userID, mode: 'mock' }));
  showConnStatus('connected', '⚠️ 模拟模式（消息不会真正发送）');
  enterMainApp();
}

// ========== 进入主界面 ==========
function enterMainApp() {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('profile-name').textContent = state.userID;
  document.getElementById('profile-id').textContent = 'ID: ' + state.userID;

  // 渲染通讯录
  renderContactList();

  // 如果有历史聊天记录，渲染
  const savedChats = localStorage.getItem('sl_chats_' + state.userID);
  if (savedChats) {
    try {
      state.chats = JSON.parse(savedChats);
      renderChatListFromState();
    } catch(e) {}
  }
}

// ========== 渲染聊天列表 ==========
function renderChatList(conversations) {
  const container = document.getElementById('tab-chats');
  container.innerHTML = '';
  if (!conversations || conversations.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#999;">暂无聊天记录<br>点右上角 ＋ 开始新聊天</div>';
    return;
  }
  conversations.forEach(function(conv) {
    const peerID = conv.userProfile ? conv.userProfile.userID : conv.conversationID.replace('C2C_', '');
    const lastMsg = conv.lastMessage ? (conv.lastMessage.messageForShow || '') : '';
    const time = conv.lastMessage ? formatTime(conv.lastMessage.time * 1000) : '';
    const unread = conv.unreadCount || 0;

    const div = document.createElement('div');
    div.className = 'chat-item';
    div.onclick = function() { openChat(peerID, peerID); };
    div.innerHTML = `
      <div class="chat-avatar">${state.mockUsers[peerID] ? state.mockUsers[peerID].avatar : '👤'}</div>
      <div class="chat-info">
        <div class="chat-name">${esc(peerID)}</div>
        <div class="chat-msg">${esc(lastMsg)}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${time}</div>
        ${unread > 0 ? '<div class="chat-badge">' + unread + '</div>' : ''}
      </div>
    `;
    container.appendChild(div);
  });
}

function renderChatListFromState() {
  const container = document.getElementById('tab-chats');
  container.innerHTML = '';
  const ids = Object.keys(state.chats);
  if (ids.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#999;">暂无聊天记录<br>点右上角 ＋ 开始新聊天</div>';
    return;
  }
  ids.forEach(function(peerID) {
    const chat = state.chats[peerID];
    const lastMsg = (chat.messages && chat.messages.length > 0)
      ? chat.messages[chat.messages.length - 1].text : '';
    const div = document.createElement('div');
    div.className = 'chat-item';
    div.onclick = function() { openChat(peerID, chat.name || peerID); };
    div.innerHTML = `
      <div class="chat-avatar">${state.mockUsers[peerID] ? state.mockUsers[peerID].avatar : '👤'}</div>
      <div class="chat-info">
        <div class="chat-name">${esc(chat.name || peerID)}</div>
        <div class="chat-msg">${esc(lastMsg)}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time"></div>
      </div>
    `;
    container.appendChild(div);
  });
}

// ========== 渲染通讯录 ==========
function renderContactList() {
  const container = document.getElementById('contact-list');
  if (!container) return;
  container.innerHTML = '';
  Object.keys(state.mockUsers).forEach(function(uid) {
    if (uid === state.userID) return;
    const u = state.mockUsers[uid];
    const div = document.createElement('div');
    div.className = 'contact-item';
    div.onclick = function() { openChat(uid, u.name); };
    div.innerHTML = `
      <div class="avatar">${u.avatar}</div>
      <div style="font-size:15px;">${u.name} <span style="color:#999;font-size:13px;">(${uid})</span></div>
    `;
    container.appendChild(div);
  });
}

// ========== 打开聊天 ==========
function openChat(peerID, name) {
  state.currentChat = peerID;
  document.getElementById('chat-title').textContent = name || peerID;
  document.getElementById('chat-page').classList.add('show');
  document.getElementById('main-app').style.display = 'none';

  // 渲染历史消息
  renderChatMessages(peerID);

  // 滚动到底部
  scrollToBottom();
}

function renderChatMessages(peerID) {
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  const chat = state.chats[peerID];
  if (!chat || !chat.messages) return;
  chat.messages.forEach(function(msg) { appendMessageBubble(msg); });
}

function appendMessageBubble(msg) {
  const container = document.getElementById('chat-messages');
  const isSelf = msg.from === state.userID;
  const div = document.createElement('div');
  div.className = 'msg-bubble' + (isSelf ? ' self' : '');
  div.innerHTML = `
    <div class="avatar">${isSelf ? '👤' : (state.mockUsers[msg.from] ? state.mockUsers[msg.from].avatar : '👤')}</div>
    <div class="bubble-wrap">
      <div class="bubble">${esc(msg.text)}</div>
      <div class="msg-time">${formatTime(msg.time)}</div>
    </div>
  `;
  container.appendChild(div);
}

function closeChat() {
  document.getElementById('chat-page').classList.remove('show');
  document.getElementById('main-app').style.display = 'flex';
  state.currentChat = null;
  saveChats();
}

// ========== 发送消息 ==========
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !state.currentChat) return;

  const msg = {
    from: state.userID,
    to: state.currentChat,
    text: text,
    time: Date.now(),
    isSelf: true
  };

  // 保存到本地
  if (!state.chats[state.currentChat]) {
    state.chats[state.currentChat] = { name: state.currentChat, messages: [] };
  }
  state.chats[state.currentChat].messages.push(msg);
  appendMessageBubble(msg);
  input.value = '';
  scrollToBottom();
  saveChats();

  if (state.mode === 'real' && state.tim && state.isConnected) {
    // 真实模式：通过 IM 发送
    try {
      const imMsg = state.tim.createTextMessage({
        to: state.currentChat,
        conversationType: TIM.TYPES.CONV_C2C,
        payload: { text: text }
      });
      await state.tim.sendMessage(imMsg);
    } catch (err) {
      console.error('Send message failed:', err);
    }
  } else {
    // 模拟模式：模拟回复
    setTimeout(function() {
      const reply = {
        from: state.currentChat,
        to: state.userID,
        text: getMockReply(text),
        time: Date.now(),
        isSelf: false
      };
      if (!state.chats[state.currentChat]) {
        state.chats[state.currentChat] = { name: state.currentChat, messages: [] };
      }
      state.chats[state.currentChat].messages.push(reply);
      if (state.currentChat) {
        appendMessageBubble(reply);
        scrollToBottom();
        saveChats();
      }
    }, 800 + Math.random() * 1200);
  }
}

function handleIncomingMessage(msg) {
  const from = msg.from;
  const text = msg.payload ? msg.payload.text : '';
  if (!text) return;

  const newMsg = {
    from: from,
    to: state.userID,
    text: text,
    time: Date.now(),
    isSelf: false
  };

  if (!state.chats[from]) {
    state.chats[from] = { name: from, messages: [] };
  }
  state.chats[from].messages.push(newMsg);
  saveChats();

  // 如果正在和这个人聊天，显示消息
  if (state.currentChat === from) {
    appendMessageBubble(newMsg);
    scrollToBottom();
  } else {
    // 显示通知
    if (Notification.permission === 'granted') {
      new Notification('顺聊 - ' + from, { body: text });
    }
  }
}

function getMockReply(text) {
  const replies = [
    '好的！',
    '收到 👍',
    '哈哈，有趣~',
    '嗯嗯，知道了',
    '稍等，我看看',
    '没问题！',
    '好的，待会回复你',
    '👌',
    '666',
    '哈哈哈',
  ];
  return replies[Math.floor(Math.random() * replies.length)];
}

// ========== 标签页切换 ==========
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('.tab[data-tab="' + tab + '"]').classList.add('active');
  ['chats', 'contacts', 'discover', 'me'].forEach(function(t) {
    document.getElementById('tab-' + t).classList.add('hidden');
  });
  document.getElementById('tab-' + tab).classList.remove('hidden');

  const titles = { chats: '顺聊', contacts: '通讯录', discover: '发现', me: '我' };
  document.getElementById('page-title').textContent = titles[tab];
}

// ========== 搜索 ==========
function showSearch() {
  document.getElementById('search-bar').classList.toggle('hidden');
  if (!document.getElementById('search-bar').classList.contains('hidden')) {
    document.getElementById('search-input').focus();
  }
}

function doSearch(keyword) {
  if (!keyword) return;
  alert('搜索功能开发中，关键词：' + keyword);
}

// ========== 添加 ==========
function showAdd() {
  const tab = document.querySelector('.tab.active').dataset.tab;
  if (tab === 'chats') {
    const userID = prompt('输入要聊天的用户ID：');
    if (userID && userID !== state.userID) {
      openChat(userID, userID);
    }
  }
}

// ========== 退出登录 ==========
function doLogout() {
  if (state.tim) {
    state.tim.logout().catch(function() {});
    state.tim = null;
  }
  state.isConnected = false;
  state.userID = '';
  state.userSig = '';
  state.currentChat = null;
  state.chats = {};
  localStorage.removeItem('sl_user');
  document.getElementById('main-app').classList.add('hidden');
  document.getElementById('login-page').classList.remove('hidden');
  document.getElementById('conn-status').classList.add('hidden');
}

// ========== 工具函数 ==========
function saveChats() {
  localStorage.setItem('sl_chats_' + state.userID, JSON.stringify(state.chats));
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) {
    return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
  }
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 5000);
}

function showConnStatus(type, text) {
  const el = document.getElementById('conn-status');
  el.className = type;
  el.textContent = text;
  el.classList.remove('hidden');
  if (type === 'connected') {
    setTimeout(function() { el.classList.add('hidden'); }, 3000);
  }
}

function scrollToBottom() {
  const el = document.getElementById('chat-messages');
  el.scrollTop = el.scrollHeight;
}

function showHelp() {
  alert('【如何获取 UserSig】\n\n' +
        '1. 登录腾讯云控制台\n' +
        '2. 进入「即时通信 IM」\n' +
        '3. 点击你的应用\n' +
        '4. 左侧菜单：「辅助工具」→「UserSig 生成」\n' +

        '🔗 控制台地址：\nhttps://console.cloud.tencent.com/im');
}
